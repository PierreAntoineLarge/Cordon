<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ma Liste Géante</title>
    <style>
      /* Styles de base */
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background-color: #f4f4f9;
        margin: 0;
        padding: 40px;
        display: flex;
        flex-direction: column;
        align-items: flex-start; /* Aligne tout à gauche */
      }

      /* Zone de saisie */
      .input-container {
        margin-bottom: 50px;
        display: flex;
        gap: 10px;
      }

      input {
        padding: 10px;
        font-size: 1.2rem;
        border: 2px solid #ddd;
        border-radius: 8px;
        outline: none;
      }

      button#add-btn {
        padding: 10px 20px;
        font-size: 1.2rem;
        background-color: #4caf50;
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        transition: background 0.3s;
      }

      button#add-btn:hover {
        background-color: #45a049;
      }

      /* La liste */
      #text-list {
        list-style: none;
        padding: 0;
        width: 100%;
      }

      .text-item {
        display: flex;
        align-items: center;
        gap: 20px;
        margin-bottom: 20px;
        animation: fadeIn 0.3s ease-out;
      }

      /* Le texte affiché en GRAND */
      .large-text {
        font-size: 4rem; /* Taille imposante */
        font-weight: bold;
        color: #333;
        margin: 0;
        word-break: break-word;
        max-width: 80%;
      }

      /* La poubelle */
      .delete-btn {
        background: none;
        border: none;
        cursor: pointer;
        font-size: 1.5rem;
        color: #ff4d4d;
        transition:
          transform 0.2s,
          color 0.2s;
        display: flex;
        align-items: center;
      }

      .delete-btn:hover {
        color: #cc0000;
        transform: scale(1.2);
      }

      /* Animation d'apparition */
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateX(-20px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }
    </style>
  </head>
  <body>
    <div class="input-container">
      <input
        type="text"
        id="user-input"
        placeholder="Écris quelque chose..."
        maxlength="50"
      />
      <button id="add-btn">Valider</button>
    </div>

    <ul id="text-list">
      <!-- Les textes s'afficheront ici -->
    </ul>

    <script>
      const input = document.getElementById("user-input");
      const addBtn = document.getElementById("add-btn");
      const list = document.getElementById("text-list");

      // Fonction pour ajouter un élément
      function addText() {
        const val = input.value.trim();

        if (val === "") return; // Ne rien faire si c'est vide

        // Création de l'élément de liste
        const li = document.createElement("li");
        li.className = "text-item";

        // Création du texte géant
        const span = document.createElement("span");
        span.className = "large-text";
        span.textContent = val;

        // Création du bouton supprimer (poubelle)
        const delBtn = document.createElement("button");
        delBtn.className = "delete-btn";
        delBtn.innerHTML = "🗑️"; // Icône Emoji simple
        delBtn.title = "Supprimer";
        delBtn.onclick = function () {
          li.remove();
        };

        // Assemblage
        li.appendChild(span);
        li.appendChild(delBtn);
        list.appendChild(li);

        // Réinitialisation de l'input
        input.value = "";
        input.focus();
      }

      // Ecouteur clic bouton
      addBtn.addEventListener("click", addText);

      // Ecouteur touche Entrée
      input.addEventListener("keypress", (e) => {
        if (e.key === "Enter") {
          addText();
        }
      });
    </script>
  </body>
</html>
